<!DOCTYPE html>
<html>
<head>
    <title>Report Issue</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .location-box {
            display: flex;
            gap: 10px;
        }

        .location-box input {
            flex: 1;
        }

        .loc-btn {
            padding: 10px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #4f46e5;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 12px;
            text-decoration: none;
            color: #6366f1;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="form-box">
    <h2>Report Issue</h2>

    <form action="/submit" method="POST" enctype="multipart/form-data">

        <!-- DESCRIPTION -->
        <textarea name="description" placeholder="Describe issue" required></textarea>

        <!-- LOCATION + BUTTON -->
        <div class="location-box">
            <input type="text" id="location" name="location" placeholder="Location" required>
            <button type="button" class="loc-btn" onclick="getLocation()">📍</button>
        </div>

        <!-- IMAGE -->
        <input type="file" name="image">

        <!-- SUBMIT -->
        <button type="submit">Submit</button>

    </form>

    <a href="/dashboard">View Complaints</a>
</div>

<!-- LOCATION SCRIPT -->
<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("location").value =
                position.coords.latitude + "," + position.coords.longitude;
        });
    } else {
        alert("Geolocation not supported");
    }
}
</script>

</body>
</html>
