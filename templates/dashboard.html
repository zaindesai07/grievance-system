<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fb;
            margin: 0;
        }

        .navbar {
            background: #1e293b;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-box {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            color: white;
        }

        .total { background: #6366f1; }
        .pending { background: #f59e0b; }
        .progress { background: #3b82f6; }
        .resolved { background: #10b981; }

        .complaint {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }

        .pending-btn { background: orange; color: white; }
        .progress-btn { background: blue; color: white; }
        .resolved-btn { background: green; color: white; }
        .delete-btn { background: red; color: white; }

        img {
            max-width: 200px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Grievance Dashboard</h2>
    <a href="/logout" style="color:white;">Logout</a>
</div>

<div class="container">

    <!-- STATS -->
    <div class="stats">
        <div class="card-box total">Total: {{ total }}</div>
        <div class="card-box pending">Pending: {{ pending }}</div>
        <div class="card-box progress">In Progress: {{ progress }}</div>
        <div class="card-box resolved">Resolved: {{ resolved }}</div>
    </div>

    <!-- COMPLAINTS -->
    {% for c in complaints %}
    <div class="complaint">
        <b>Description:</b> {{ c.description }} <br>
        <b>Location:</b> {{ c.location }} <br>
        <b>Status:</b> {{ c.status }}

        {% if c.image %}
        <br><img src="{{ c.image }}">
        {% endif %}

        <br><br>

        <a href="/update_status/{{ c.id }}/Pending">
            <button class="btn pending-btn">Pending</button>
        </a>

        <a href="/update_status/{{ c.id }}/In Progress">
            <button class="btn progress-btn">Progress</button>
        </a>

        <a href="/update_status/{{ c.id }}/Resolved">
            <button class="btn resolved-btn">Resolved</button>
        </a>

        <a href="/delete/{{ c.id }}">
            <button class="btn delete-btn">Delete</button>
        </a>
    </div>
    {% endfor %}

</div>

</body>
</html>
