<!DOCTYPE html>
<html>
<head>
    <title>Report Issue</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        textarea {
            resize: none;
        }

        .location-box {
            display: flex;
            gap: 10px;
        }

        .location-box input {
            flex: 1;
        }

        .loc-btn {
            width: 50px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        .loc-btn:hover {
            background: #16a34a;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #3730a3;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        input[type="file"] {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

<div class="form-box">
    <h2>🚨 Report Issue</h2>

    <form action="/submit" method="POST" enctype="multipart/form-data">

        <textarea name="description" placeholder="Describe the issue..." required></textarea>

        <div class="location-box">
            <input type="text" id="location" name="location" placeholder="Location" required>
            <button type="button" class="loc-btn" onclick="getLocation()">📍</button>
        </div>

        <input type="file" name="image">

        <button type="submit">Submit</button>

    </form>

    <a href="/dashboard">View Complaints</a>
</div>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("location").value =
                position.coords.latitude + "," + position.coords.longitude;
        });
    } else {
        alert("Geolocation not supported");
    }
}
</script>

</body>
</html>
